proxy:
  host: "0.0.0.0"
  port: 8080
  poll_interval: 10

# Supported model values (matched as substrings, controls icon in UI):
#   mk4, mk3, mini, core_one, core_one_l, xl,
#   v2.4, trident, v0, positron, p1s, micron

printers:
  - id: "mk4"
    name: "Prusa MK4"
    type: "prusalink"
    model: "MK4S"
    url: "http://192.168.1.50"
    username: "maker"
    password: "your-api-key-here"

  - id: "core_one"
    name: "Core One"
    type: "prusalink"
    model: "core_one"
    url: "http://192.168.1.51"
    username: "maker"
    password: "your-api-key-here"
    camera: true                    # enable BuddyCam snapshots

  - id: "voron"
    name: "Voron 2.4"
    type: "moonraker"
    model: "V2.4r2"
    url: "http://192.168.1.60:7125"
    api_key: ""

  - id: "ender"
    name: "Ender 3 K1"
    type: "moonraker"
    model: "K1"
    url: "http://192.168.1.61:7125"
    api_key: "your-api-key-here"

  - id: "p1s"
    name: "Bambu P1S"
    type: "bambulab"
    model: "p1s"
    url: "192.168.1.70"           # printer IP (MQTT, not HTTP)
    serial: "01P00A000000000"     # printer serial number
    password: "12345678"          # LAN Access Code from printer screen
